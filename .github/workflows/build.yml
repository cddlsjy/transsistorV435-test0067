#!/usr/bin/env python3
"""
GitHub 一键上传工具 (Python GUI 版)
支持默认工作流模板、自定义 YML 和 ZIP 上传。
新增功能：
- 下载仓库 ZIP（带日志）
- 上传文件夹（自动打包并保留 .gitignore/build.gradle 等）
- 创建新仓库后自动切换模式并显示内容
- 剪贴板片段管理（最多10个，可永久保存）
"""

